name: Generate Snake

on:
  schedule:
    - cron: "0 */6 * * *" # runs every 6 hours (smoother updates)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: reportJNG
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark
            dist/snake-neon.svg?palette=github-dark&color_snake=#00f7ff&color_dots=#0d1117,#1f6feb,#58a6ff,#79c0ff,#a5d6ff

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
